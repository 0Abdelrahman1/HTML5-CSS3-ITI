    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        canvas{
            border: 3px solid black;
        }
    </style>
</head>
<body>
    <canvas id="myCanvas" width="500" height="500"></canvas>
    <script>
        {
            var context = document.getElementById("myCanvas").getContext('2d');
            var sx = 350, sy = 250, sr = 10;
            var grd = context.createRadialGradient(sx, sy, sr, 250, 250, 130);
            grd.addColorStop(0, "white")
            grd.addColorStop(1, "blue")
            context.fillStyle=grd
            context.arc(250, 250, 130, 0, 2 * Math.PI);
            context.fill();
            context.lineWidth = 5
            context.stroke();
    
            context.beginPath();
            context.arc(250, 250, 100, 0, 2 * Math.PI);
            context.fill();
            context.stroke();
            
            // context.beginPath();
            // context.lineWidth = 1
            // context.arc(sx, sy, sr, 0, 2 * Math.PI);
            // context.stroke();

            var lrh = 130
            var lx = 240, ly = 180
            var rx = 230, ry = 195
            context.fillStyle = 'black'
            context.save();
            context.translate(lx, ly);
            context.rotate(Math.PI * 0.2)
            context.translate(-lx, -ly);
            context.fillRect(lx, ly, 20, lrh);
            
            context.restore()
            context.save();
            context.translate(rx, ry);
            context.rotate(Math.PI * -0.26)
            context.translate(-rx, -ry);
            context.fillRect(rx, ry, 20, lrh);
            
            context.restore()
            context.fillRect(200, 235, 100, 20);
            
        }
