<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        canvas{
            border: 3px solid black;
        }
    </style>
</head>
<body>
    <canvas id="myCanvas" width="500" height="500"></canvas>
    <script>
        var context = document.getElementById("myCanvas").getContext('2d');
        context.save();
        for (let i = 0; i < 3; i++)
            for (let j = 0; j < 3; j++)
            {
                context.translate(100 * i + 125, 100 * j + 125)
                context.lineWidth = 5
                context.beginPath()
                context.strokeStyle = "black"
                context.moveTo(0, 0)
                context.lineTo(0, 50)
                context.lineTo(50, 50)
                context.lineTo(50, 0)
                context.closePath();
                context.stroke();
                context.restore();
                context.save();
            }
    </script>
</body>
</html>
