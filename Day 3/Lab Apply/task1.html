<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .ui{
            font-size: 10px;
            color: gray;
        }
        input:invalid{
            border-color: red;
        }
        input:valid + .ui{
            visibility: hidden;
        }
    </style>
</head>
<body>
    <form>
        <input id="usr" type="text" placeholder="Username" pattern="[a-zA-Z]+" required>
        <div class="ui">The required user name may only be a series of alphabetical characters.</div>
        <input id="eml" type="email" placeholder="Email" required>
        <div class="ui">The required email may not include any special characters other than the '@' sign.</div>
        <input type="submit">
    </form>
</body>
</html>
