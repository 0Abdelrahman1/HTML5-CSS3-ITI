<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1 math {
            color: red;
        }
    </style>
</head>
<body>
    <svg width="300" height="400">
        <polygon points="150,0 150,200 0,200" fill="red"></polygon>
        <text x="160" y="100">a</text>
        <text x="75" y="220">b</text>
        <text x="70" y="90">c</text>
    </svg>
    <h1>
        according to pythagoras theorem
        <br>
        <br>
        <math>
            <mrow>
                <mi>c</mi>
                <mo>=</mo>
                <msqrt>
                    <msup>
                        <mrow>
                            <mi>a</mi>
                        </mrow>
                        <mrow>
                            <mn>2</mn>
                        </mrow>
                    </msup>
                    <mo>+</mo>
                    <msup>
                        <mrow>
                            <mi>b</mi>
                        </mrow>
                        <mrow>
                            <mn>2</mn>
                        </mrow>
                    </msup>
                </msqrt>
            </mrow>
        </math>
    </h1>
</body>
</html>
